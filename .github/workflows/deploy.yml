name: Deploy to EC2 via SSM

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: JDK 21 설정
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Maven 빌드
        run: mvn clean package -DskipTests

      - name: AWS 인증
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: ECR 로그인
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: ECR 리포지토리 생성 (없을 경우)
        run: |
          aws ecr describe-repositories --repository-names springboot-redis || \
          aws ecr create-repository --repository-name springboot-redis

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: Docker 이미지 빌드 & ECR 푸시
        env:
          ECR_IMAGE: ${{ steps.login-ecr.outputs.registry }}/springboot-redis:latest
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --push \
            -t $ECR_IMAGE .

      - name: SSM으로 EC2 배포
        env:
          ECR_IMAGE: ${{ steps.login-ecr.outputs.registry }}/springboot-redis:latest
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids i-0528bc06b5cd92ed1 \
            --document-name "AWS-RunShellScript" \
            --parameters "{\"commands\":[
              \"aws ecr get-login-password --region ap-northeast-2 | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}\",
              \"cd /opt/docker\",
              \"git pull origin master || git clone https://github.com/KBY-CL/springboot_redis.git .\",
              \"echo ECR_IMAGE=$ECR_IMAGE > .env\",
              \"docker compose pull\",
              \"docker compose up -d\",
              \"docker image prune -f\"
            ]}" \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND_ID"

          aws ssm wait command-executed \
            --command-id $COMMAND_ID \
            --instance-id i-0528bc06b5cd92ed1

          aws ssm get-command-invocation \
            --command-id $COMMAND_ID \
            --instance-id i-0528bc06b5cd92ed1 \
            --query "StandardOutputContent" \
            --output text
